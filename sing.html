    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - EVOLVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="sign.css">
</head>
<body>
<a href="index.html" class="back-home">
        <i class="fas fa-arrow-left"></i>
        <span>Back to Home</span>
    </a>
<br>
<br>
<br>


    
    <div class="auth-header">

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="logo-section">
            </div>
            <h2>!Welcome Back</h2>
            <p>Log in to access the smart learning platform</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="password">
                    <i class="fas fa-lock"></i>
                    Password
                </label>
                <div class="password-input">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <div class="form-options">
                <label class="checkbox-container">
                    <input type="checkbox" id="remember">
                    <span class="checkmark"></span>
                    Remember me
                </label>
                <a href="forget.html" class="forgot-password">?Forgot password</a>
            </div>

            <button  type="submit" class="btn-submit">
            <i class="fas fa-arrow-right"></i>

                <span>Login</span>
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <div class="social-login" style="justify-content: center;">
                <button id="googleBtn" type="button" class="social-btn google">
                    <i class="fab fa-google"></i>
                    Login with Google
                </button>
            </div>

            <p class="switch-form">
                Don’t have an account?
                <a href="register.html">Register now</a>
            </p>
        </form>
    </div>

    <div class="illustration-content">
        <h3>✨ Smart Learning Awaits You</h3>
        <ul class="features-list">
            <li><i class="fas fa-check-circle"></i> Personalized learning paths</li>
            <li><i class="fas fa-check-circle"></i> AI assistant available 24/7</li>
            <li><i class="fas fa-check-circle"></i> Expert teachers</li>
            <li><i class="fas fa-check-circle"></i> Accredited certificates</li>
        </ul>
    </div>
</div>


<script src="nav-handler.js"></script>
<script type="model" src="evolve-web-app.js"></script>
<script src="sign.js"></script>
<script type="model" src="login-google.js"></script>
</body>
</html>
