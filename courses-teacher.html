<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVOLVE – My Courses</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--primary:#89b084;--primary-dark:#6e9b73;--primary-light:#eef3ee;--primary-glow:rgba(137,176,132,0.25);--bg:#f9f8f3;--surface:#fff;--soft:#eef3ee;--text:#2d3436;--muted:#6b7280;--border:#e5e7eb;--shadow:0 4px 20px rgba(0,0,0,.07);--shadow-lg:0 12px 40px rgba(0,0,0,.10);--accent:#d4a373;--radius:14px;--ease:cubic-bezier(.4,0,.2,1);--sidebar-w:240px}
[data-theme="dark"]{--bg:#0f172a;--surface:#111827;--soft:#1e2d3d;--text:#e5e7eb;--muted:#9ca3af;--border:#1f2937;--shadow:0 4px 20px rgba(0,0,0,.3);--shadow-lg:0 12px 40px rgba(0,0,0,.5)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;line-height:1.6}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.sidebar{width:var(--sidebar-w);min-height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;transition:transform .3s var(--ease)}
.sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent),var(--primary));background-size:200%;animation:shimmer 3s infinite}
.sidebar-logo{display:flex;align-items:center;gap:12px;padding:22px 20px 20px;border-bottom:1px solid var(--border);text-decoration:none}
.logo-box{width:38px;height:38px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;box-shadow:0 4px 14px var(--primary-glow);flex-shrink:0;transition:transform .3s}
.sidebar-logo:hover .logo-box{transform:rotate(-8deg) scale(1.08)}
.logo-name{font-size:20px;font-weight:900;color:var(--text);letter-spacing:-.6px}
.logo-name span{color:var(--primary)}
.sidebar-section{padding:18px 12px 4px}
.sidebar-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);padding:0 10px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:11px;color:var(--muted);font-size:13.5px;font-weight:500;text-decoration:none;margin-bottom:2px;transition:all .2s;position:relative;cursor:pointer;background:none;border:none;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--soft);color:var(--primary);transform:translateX(4px)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:700}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 3px 3px 0;background:var(--primary)}
.nav-icon{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.sidebar-profile{margin-top:auto;padding:14px 12px;border-top:1px solid var(--border)}
.profile-card{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;background:var(--soft);text-decoration:none;transition:all .25s;border:1px solid transparent}
.profile-card:hover{background:var(--primary-light);border-color:var(--primary)}
.p-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:13px;flex-shrink:0}
.p-name{font-size:13px;font-weight:700;color:var(--text)}.p-role{font-size:11px;color:var(--muted)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199;backdrop-filter:blur(3px)}
.sidebar-overlay.open{display:block}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100;gap:16px}
.topbar-left{display:flex;align-items:center;gap:12px}
.hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;transition:background .2s}
.hamburger:hover{background:var(--soft)}
.hamburger span{display:block;width:22px;height:2px;background:var(--text);border-radius:2px;transition:all .3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.page-title{font-size:18px;font-weight:900;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:10px}
.icon-btn{width:38px;height:38px;border-radius:10px;background:var(--soft);border:1px solid var(--border);color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;position:relative}
.icon-btn:hover{background:var(--primary-light);color:var(--primary);border-color:var(--primary);transform:translateY(-1px)}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid var(--surface)}
.create-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:25px;font-size:13px;font-weight:700;border:none;cursor:pointer;box-shadow:0 4px 16px var(--primary-glow);transition:all .25s;font-family:inherit}
.create-btn:hover{transform:translateY(-2px) scale(1.04)}

/* PAGE CONTENT */
.content{padding:30px 32px;flex:1;animation:fadeUp .5s var(--ease)}

/* Filters */
.filters-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.filters-bar h1{font-size:22px;font-weight:900}
.filter-group{display:flex;gap:8px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:25px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--primary);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 14px var(--primary-glow)}
.search-input{padding:8px 14px;border-radius:25px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s;min-width:200px}
.search-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}

/* Course grid */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.course-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden;transition:all .3s var(--ease);animation:scaleIn .4s var(--ease) backwards;cursor:pointer}
.course-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.course-banner{height:120px;display:flex;align-items:center;justify-content:center;font-size:46px;position:relative;overflow:hidden}
.course-banner::after{content:'';position:absolute;inset:0;background:rgba(0,0,0,.08)}
.course-body{padding:18px 20px}
.course-subject{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:4px}
.course-name{font-size:16px;font-weight:900;color:var(--text);margin-bottom:6px;line-height:1.3}
.course-meta{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.course-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-weight:500}
.course-progress-wrap{margin-bottom:14px}
.course-progress-label{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:5px}
.course-progress-label span:last-child{color:var(--primary)}
.progress-bar{height:6px;background:var(--soft);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-dark));border-radius:3px;transition:width .8s var(--ease)}
.course-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border)}
.students-avatars{display:flex}
.student-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--surface);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;margin-left:-8px;flex-shrink:0}
.student-av:first-child{margin-left:0}
.student-count{font-size:12px;font-weight:600;color:var(--muted);margin-left:8px}
.course-actions{display:flex;gap:8px}
.course-btn{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid var(--border);background:var(--soft);color:var(--text);transition:all .2s;font-family:inherit;text-decoration:none}
.course-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
.course-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.course-btn.primary:hover{background:var(--primary-dark)}

/* Stats banner */
.stats-banner{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.sb-card{background:var(--surface);border-radius:12px;padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.sb-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-val{font-size:24px;font-weight:900}
.sb-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.3);max-width:480px;width:90%;animation:scaleIn .3s var(--ease);max-height:90vh;overflow-y:auto}
.modal-header{padding:24px 24px 0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:18px;font-weight:900}
.modal-close{width:34px;height:34px;border-radius:50%;background:var(--soft);border:1px solid var(--border);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--muted)}
.modal-close:hover{background:#fee2e2;color:#dc2626;transform:rotate(90deg)}
.modal-body{padding:20px 24px 24px}
.modal-field{margin-bottom:16px}
.modal-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.modal-input,.modal-select,.modal-textarea{width:100%;padding:11px 14px;background:var(--soft);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s;outline:none}
.modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
.modal-textarea{resize:vertical;min-height:80px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;padding-top:8px}
.btn-cancel{padding:10px 20px;background:var(--soft);border:1px solid var(--border);border-radius:25px;cursor:pointer;font-size:13px;font-weight:700;color:var(--muted);transition:all .2s;font-family:inherit}
.btn-cancel:hover{background:var(--border)}
.btn-submit{padding:10px 24px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;border-radius:25px;cursor:pointer;font-size:13px;font-weight:700;border:none;box-shadow:0 4px 16px var(--primary-glow);transition:all .25s;font-family:inherit}
.btn-submit:hover{transform:translateY(-2px)}

/* Course detail panel */
.detail-panel{background:var(--surface);border-radius:20px;border:1px solid var(--border);box-shadow:0 30px 80px rgba(0,0,0,.3);max-width:600px;width:95%;animation:scaleIn .3s var(--ease);max-height:90vh;overflow-y:auto}
.detail-banner{height:160px;display:flex;align-items:center;justify-content:center;font-size:64px;border-radius:20px 20px 0 0;position:relative}
.detail-body{padding:24px}
.detail-title{font-size:22px;font-weight:900;margin-bottom:4px}
.detail-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.detail-stat{background:var(--soft);border-radius:11px;padding:14px 16px;border:1px solid var(--border)}
.detail-stat-val{font-size:22px;font-weight:900}
.detail-stat-lbl{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.lesson-list{display:flex;flex-direction:column;gap:10px}
.lesson-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--soft);border-radius:11px;border:1px solid var(--border);transition:all .2s}
.lesson-item:hover{border-color:var(--primary)}
.lesson-num{width:28px;height:28px;border-radius:50%;background:var(--primary-light);color:var(--primary-dark);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0}
.lesson-title{font-size:13px;font-weight:700}
.lesson-meta{font-size:11px;color:var(--muted);margin-top:2px}
.lesson-status{margin-left:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.ls-done{background:var(--primary-light);color:var(--primary-dark)}
.ls-next{background:#FEF3C7;color:#B45309}
.ls-todo{background:var(--soft);color:var(--muted);border:1px solid var(--border)}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;animation:slideIn .4s;max-width:300px;border-left:4px solid var(--primary)}
.toast.success{border-left-color:#10b981}.toast.error{border-left-color:#ef4444}

@media(max-width:1024px){:root{--sidebar-w:0px}.sidebar{transform:translateX(-100%);width:240px}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.hamburger{display:flex}.stats-banner{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.courses-grid{grid-template-columns:1fr}.filters-bar{flex-direction:column;align-items:stretch}.search-input{width:100%}.stats-banner{grid-template-columns:1fr 1fr}.content{padding:20px 16px}}
</style>
</head>
<body>
<div class="toast-container" id="toastC"></div>
<div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <a href="index.html" class="sidebar-logo">
    <div class="logo-box">E</div>
    <span class="logo-name">EVO<span>LVE</span></span>
  </a>
  <div class="sidebar-section">
    <div class="sidebar-label">Main</div>
    <button class="nav-item" onclick="location.href='teacher_dashboard.html'"><span class="nav-icon">🏠</span>Dashboard</button>
    <button class="nav-item active"><span class="nav-icon">📚</span>Courses</button>
    <button class="nav-item" onclick="location.href='students.html'"><span class="nav-icon">👥</span>Students</button>
    <button class="nav-item" onclick="location.href='schedule.html'"><span class="nav-icon">📅</span>Schedule</button>
    <button class="nav-item" onclick="location.href='sparky.html'"><span class="nav-icon">🤖</span>AI Assistant</button>
  </div>
  <div class="sidebar-section">
    <div class="sidebar-label">Tools</div>
    <button class="nav-item" onclick="location.href='messages.html'"><span class="nav-icon">💬</span>Messages<span class="nav-badge">5</span></button>
    <button class="nav-item" onclick="location.href='library.html'"><span class="nav-icon">📖</span>Library</button>
    <button class="nav-item" onclick="location.href='settings.html'"><span class="nav-icon">⚙️</span>Settings</button>
  </div>
  <div class="sidebar-profile">
    <a href="profile_teacher.html" class="profile-card">
      <div class="p-avatar">MA</div>
      <div><div class="p-name">Mr. Anderson</div><div class="p-role">Teacher</div></div>
    </a>
  </div>
</aside>

<div class="main">
  <header class="topbar">
    <div class="topbar-left">
      <button class="hamburger" id="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <span class="page-title">📚 My Courses</span>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
      <button class="icon-btn" onclick="location.href='messages.html'">🔔<span class="notif-dot"></span></button>
      <button class="icon-btn" onclick="location.href='schedule.html'">📅</button>
      <button class="create-btn" onclick="openModal('createCourseModal')"><span>＋</span><span>New Course</span></button>
    </div>
  </header>

  <div class="content">
    <!-- Stats banner -->
    <div class="stats-banner">
      <div class="sb-card"><div class="sb-icon" style="background:#eef3ee">📚</div><div><div class="sb-val">6</div><div class="sb-lbl">Total Courses</div></div></div>
      <div class="sb-card"><div class="sb-icon" style="background:#FEF3C7">👥</div><div><div class="sb-val">128</div><div class="sb-lbl">Total Students</div></div></div>
      <div class="sb-card"><div class="sb-icon" style="background:#EEF2FF">📝</div><div><div class="sb-val">34</div><div class="sb-lbl">Total Lessons</div></div></div>
      <div class="sb-card"><div class="sb-icon" style="background:#fce7f3">⭐</div><div><div class="sb-val">4.8</div><div class="sb-lbl">Avg. Rating</div></div></div>
    </div>

    <!-- Filters -->
    <div class="filters-bar">
      <h1>All Courses</h1>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
        <input class="search-input" placeholder="🔍 Search courses..." oninput="filterCourses(this.value)">
        <div class="filter-group" id="filterGroup">
          <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
          <button class="filter-btn" onclick="setFilter('science',this)">Science</button>
          <button class="filter-btn" onclick="setFilter('math',this)">Math</button>
          <button class="filter-btn" onclick="setFilter('english',this)">English</button>
          <button class="filter-btn" onclick="setFilter('art',this)">Art</button>
        </div>
      </div>
    </div>

    <!-- Grid -->
    <div class="courses-grid" id="coursesGrid">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- Create Course Modal -->
<div class="modal-overlay" id="createCourseModal">
  <div class="modal">
    <div class="modal-header"><span class="modal-title">📚 Create New Course</span><button class="modal-close" onclick="closeModal('createCourseModal')">✕</button></div>
    <div class="modal-body">
      <div class="modal-field"><label class="modal-label">Course Name</label><input class="modal-input" id="cName" placeholder="e.g. Advanced Biology"></div>
      <div class="modal-field"><label class="modal-label">Subject</label>
        <select class="modal-select" id="cSubj">
          <option value="science">Science</option><option value="math">Math</option>
          <option value="english">English</option><option value="art">Art</option>
        </select>
      </div>
      <div class="modal-field"><label class="modal-label">Class / Grade</label><select class="modal-select"><option>Grade 7A</option><option>Grade 7B</option><option>Grade 8A</option><option>Grade 8B</option></select></div>
      <div class="modal-field"><label class="modal-label">Description</label><textarea class="modal-textarea" id="cDesc" placeholder="Course description..."></textarea></div>
      <div class="modal-footer"><button class="btn-cancel" onclick="closeModal('createCourseModal')">Cancel</button><button class="btn-submit" onclick="createCourse()">Create Course</button></div>
    </div>
  </div>
</div>

<!-- Course Detail Modal -->
<div class="modal-overlay" id="detailModal">
  <div class="detail-panel">
    <div class="detail-banner" id="detailBanner"></div>
    <div class="detail-body">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
        <div>
          <div class="detail-title" id="detailTitle"></div>
          <div class="detail-sub" id="detailSub"></div>
        </div>
        <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
      </div>
      <div class="detail-grid" id="detailStats"></div>
      <div style="font-size:14px;font-weight:800;margin-bottom:12px">📋 Lessons</div>
      <div class="lesson-list" id="detailLessons"></div>
      <div style="display:flex;gap:10px;margin-top:20px">
<button class="btn-submit" style="flex:1"
onclick="closeModal('detailModal'); toast('✏️ Opening editor...','info'); window.location.href='course-editor-teacher.html';">
Edit Course
</button>        <button class="btn-cancel" onclick="closeModal('detailModal')">Close</button>
      </div>
    </div>
  </div>
</div>

<script>
const COURSES = [
  {id:1,name:'Solar System & Space',subject:'science',grade:'Grade 8A',students:32,progress:75,emoji:'🌌',color:'#1e293b',lessons:['Introduction to the Solar System','Planets & Their Properties','The Sun & Its Layers','Asteroids & Comets','Space Exploration History','Final Project'],done:[0,1,2,3],next:4},
  {id:2,name:'Algebra Fundamentals',subject:'math',grade:'Grade 7B',students:28,progress:60,emoji:'📐',color:'#1d4ed8',lessons:['Variables & Expressions','Solving Linear Equations','Inequalities','Systems of Equations','Graphing Functions','Word Problems'],done:[0,1,2],next:3},
  {id:3,name:'Creative Writing',subject:'english',grade:'Grade 7A',students:30,progress:90,emoji:'✍️',color:'#7c3aed',lessons:['Story Structure','Character Development','Dialogue & Voice','Setting & Atmosphere','Revision Techniques','Final Story Portfolio'],done:[0,1,2,3,4],next:5},
  {id:4,name:'Watercolor & Mixed Media',subject:'art',grade:'Grade 8B',students:22,progress:40,emoji:'🎨',color:'#be185d',lessons:['Color Theory Basics','Brush Techniques','Layering & Washes','Mixed Media Intro','Composition Rules','Final Exhibition Piece'],done:[0,1],next:2},
  {id:5,name:'Human Body & Biology',subject:'science',grade:'Grade 8B',students:29,progress:55,emoji:'🫀',color:'#065f46',lessons:['Cell Structure','Organ Systems','Nervous System','Digestive System','Immune System','Lab Practical'],done:[0,1,2],next:3},
  {id:6,name:'Geometry & Shapes',subject:'math',grade:'Grade 7A',students:31,progress:30,emoji:'📏',color:'#92400e',lessons:['Basic Shapes & Angles','Triangles & Properties','Circles & Pi','Area & Perimeter','3D Shapes','Final Assessment'],done:[0],next:1},
];

let currentFilter='all', currentSearch='';

function renderCourses(){
  const grid=document.getElementById('coursesGrid');
  const filtered=COURSES.filter(c=>{
    const matchF=currentFilter==='all'||c.subject===currentFilter;
    const matchS=c.name.toLowerCase().includes(currentSearch.toLowerCase())||c.grade.toLowerCase().includes(currentSearch.toLowerCase());
    return matchF&&matchS;
  });
  if(!filtered.length){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--muted);font-size:15px">No courses found 😕</div>';return}
  grid.innerHTML=filtered.map((c,i)=>`
    <div class="course-card" style="animation-delay:${i*.08}s" onclick="openDetail(${c.id})">
      <div class="course-banner" style="background:${c.color}">${c.emoji}</div>
      <div class="course-body">
        <div class="course-subject">${c.subject.toUpperCase()}</div>
        <div class="course-name">${c.name}</div>
        <div class="course-meta">
          <span class="course-meta-item">👥 ${c.students} students</span>
          <span class="course-meta-item">📋 ${c.lessons.length} lessons</span>
          <span class="course-meta-item">🎓 ${c.grade}</span>
        </div>
        <div class="course-progress-wrap">
          <div class="course-progress-label"><span>Progress</span><span>${c.progress}%</span></div>
          <div class="progress-bar"><div class="progress-fill" style="width:0%" data-w="${c.progress}%"></div></div>
        </div>
        <div class="course-footer">
          <div style="display:flex;align-items:center">
            <div class="students-avatars">
              ${['#EF4444','#6366f1','#f59e0b','#14b8a6'].map((col,j)=>`<div class="student-av" style="background:${col}">${String.fromCharCode(65+j)}</div>`).join('')}
            </div>
            <span class="student-count">+${c.students-4} more</span>
          </div>
          <div class="course-actions">
            <button class="course-btn" onclick="event.stopPropagation();location.href='students.html?course=${c.id}'">Students</button>
            <button class="course-btn primary" onclick="event.stopPropagation();openDetail(${c.id})">Open →</button>
          </div>
        </div>
      </div>
    </div>
  `).join('');
  // Animate progress bars
  setTimeout(()=>{
    document.querySelectorAll('.progress-fill').forEach(b=>{
      b.style.transition='width .8s cubic-bezier(.4,0,.2,1)';
      b.style.width=b.dataset.w;
    });
  },200);
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderCourses();
}
function filterCourses(q){currentSearch=q;renderCourses()}

function openDetail(id){
  const c=COURSES.find(x=>x.id===id);
  if(!c)return;
  document.getElementById('detailBanner').style.background=c.color;
  document.getElementById('detailBanner').textContent=c.emoji;
  document.getElementById('detailBanner').style.fontSize='64px';
  document.getElementById('detailTitle').textContent=c.name;
  document.getElementById('detailSub').textContent=c.grade+' · '+c.subject.charAt(0).toUpperCase()+c.subject.slice(1);
  document.getElementById('detailStats').innerHTML=`
    <div class="detail-stat"><div class="detail-stat-val">${c.students}</div><div class="detail-stat-lbl">Students</div></div>
    <div class="detail-stat"><div class="detail-stat-val">${c.lessons.length}</div><div class="detail-stat-lbl">Lessons</div></div>
    <div class="detail-stat"><div class="detail-stat-val">${c.progress}%</div><div class="detail-stat-lbl">Progress</div></div>
    <div class="detail-stat"><div class="detail-stat-val">${c.done.length}/${c.lessons.length}</div><div class="detail-stat-lbl">Completed</div></div>
  `;
  document.getElementById('detailLessons').innerHTML=c.lessons.map((l,i)=>{
    let cls='ls-todo',txt='To Do';
    if(c.done.includes(i)){cls='ls-done';txt='Done ✓'}
    else if(i===c.next){cls='ls-next';txt='Next Up'}
    return`<div class="lesson-item"><div class="lesson-num">${i+1}</div><div><div class="lesson-title">${l}</div><div class="lesson-meta">Lesson ${i+1} of ${c.lessons.length}</div></div><span class="lesson-status ${cls}">${txt}</span></div>`;
  }).join('');
  openModal('detailModal');
}

function createCourse(){
  const name=document.getElementById('cName').value.trim();
  if(!name){toast('⚠️ Enter a course name','error');return}
  closeModal('createCourseModal');
  document.getElementById('cName').value='';
  toast('✅ Course "'+name+'" created!','success');
}

// Sidebar
function toggleSidebar(){['sidebar','overlay','hamburger'].forEach(id=>document.getElementById(id).classList.toggle('open'))}
function closeSidebar(){['sidebar','overlay','hamburger'].forEach(id=>document.getElementById(id).classList.remove('open'))}
window.addEventListener('resize',()=>{if(window.innerWidth>1024)closeSidebar()})
function toggleTheme(){const d=document.body.getAttribute('data-theme')==='dark';document.body.setAttribute('data-theme',d?'':'dark');document.getElementById('themeBtn').textContent=d?'🌙':'☀️'}
function openModal(id){document.getElementById(id).classList.add('open');document.getElementById(id).onclick=e=>{if(e.target===document.getElementById(id))closeModal(id)}}
function closeModal(id){document.getElementById(id).classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'))})
let tid=0;
function toast(msg,type='info'){const c=document.getElementById('toastC');const t=document.createElement('div');t.className='toast '+(type||'');t.textContent=msg;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(100%)';t.style.transition='all .4s';setTimeout(()=>t.remove(),400)},3000)}

renderCourses();
</script>
</body>
</html>
